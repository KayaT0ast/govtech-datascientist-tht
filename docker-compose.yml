services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override whatever is in .env so the app always reaches the mongo service
      # on the compose network (service name "mongo"), not localhost.
      MONGODB_URI: mongodb://mongo:27017/
    depends_on:
      - mongo
    volumes:
      - .:/app                                  # live code — changes reflect without rebuild
      - kb_data:/app/knowledge-base
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  mongo_data:
  kb_data:
  hf_cache:
